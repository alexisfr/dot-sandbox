name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Run release checks
        run: ./scripts/release-check.sh "${{ github.ref_name }}"

  release:
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
          - os: ubuntu-24.04-arm
            asset_suffix: linux-aarch64
          - os: macos-latest
            asset_suffix: macos-aarch64
          - os: macos-13
            asset_suffix: macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast

      - name: Package artifact
        run: |
          mkdir -p dist
          cp zig-out/bin/dot dist/
          cp LICENSE README.md dist/
          tar -czf "dot-${{ github.ref_name }}-${{ matrix.asset_suffix }}.tar.gz" -C dist .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dot-${{ github.ref_name }}-${{ matrix.asset_suffix }}.tar.gz
          generate_release_notes: true
