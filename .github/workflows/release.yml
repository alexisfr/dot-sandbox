name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Build all targets
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          zig build -Dtarget=x86_64-linux-musl  -Doptimize=ReleaseFast
          tar czf dot-${VERSION}-linux-x86_64.tar.gz  -C zig-out/bin dot

          zig build -Dtarget=aarch64-linux-musl -Doptimize=ReleaseFast
          tar czf dot-${VERSION}-linux-aarch64.tar.gz -C zig-out/bin dot

          zig build -Dtarget=x86_64-macos       -Doptimize=ReleaseFast
          tar czf dot-${VERSION}-macos-x86_64.tar.gz  -C zig-out/bin dot

          zig build -Dtarget=aarch64-macos      -Doptimize=ReleaseFast
          tar czf dot-${VERSION}-macos-aarch64.tar.gz -C zig-out/bin dot

          sha256sum dot-*.tar.gz > checksums.txt

      - name: Create GitHub release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "dot ${{ github.ref_name }}" \
            --generate-notes \
            dot-*.tar.gz checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
